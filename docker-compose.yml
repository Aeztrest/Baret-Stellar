# BLACKTHORN: Stellar analiz API'si (apps/server, Fastify)
#
# Çalıştır (repo kökü):
#   docker compose up --build
#
# API: http://SUNUCU_IP:18080 — içeride 8080; host 8080 Coolify vb. ile çakışmasın diye 18080.
# Güvenlik duvarı: 18080 (veya DELTAG_HOST_API_PORT) açık olmalı.
#
# Demo arayüzü (apps/showcase) ayrı çalışır: `pnpm dev:showcase` ya da Vercel deploy.
# Kimlik doğrulama: varsayılan API anahtarı "docker-demo-key" (DELTAG_API_KEYS ile değiştirin).

name: blackthorn

services:
  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:${DELTAG_HOST_API_PORT:-18080}:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      LOG_LEVEL: info
      DELTAG_API_KEYS: ${DELTAG_API_KEYS:-docker-demo-key}
      # Stellar ağ + RPC — bunlar olmadan sunucu açılışta çöker (config zod .url() ister).
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}
      STELLAR_SOROBAN_RPC_URL: ${STELLAR_SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      X402_ENABLED: ${X402_ENABLED:-false}
      DELTAG_TRUST_PROXY: "true"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 20s
